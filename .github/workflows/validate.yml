name: Validate Web

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: validate-web-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate-web:
    name: Lint, Typecheck & Test Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Install auth-function dependencies
        working-directory: auth-function
        run: pnpm install --frozen-lockfile

      - name: Lint auth-function
        working-directory: auth-function
        run: pnpm lint

      - name: Type check auth-function
        working-directory: auth-function
        run: pnpm typecheck

      - name: Test auth-function
        working-directory: auth-function
        run: pnpm test
